# Resource control policy requiring KMS encryption for tagged S3 buckets
# github.com/sqlxpert/aws-rcp-s3-require-encryption-kms
# GPLv3, Copyright Paul Marcelin

[pycodestyle]
ignore = E111, E121, E122, E131, E114, E251, E275, E501, W503
# E501: Let pylint, which allows temporary, inline disabling, check line length
# max-line-length = 80
# E122, E251: These checks interfere with readable formatting of blocks of
# argparse option help text
# E131 forces hanging indents
# E275 parentheses after not avoid doubt about order of operations
